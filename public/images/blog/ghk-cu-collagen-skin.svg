    <line x1="1020" y1="220" x2="960" y2="240" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <line x1="960" y1="240" x2="1000" y2="260" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <line x1="980" y1="180" x2="1000" y2="260" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
