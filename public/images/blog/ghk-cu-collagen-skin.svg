    <line x1="700" y1="630" x2="1200" y2="130"/>
    <line x1="750" y1="630" x2="1200" y2="180"/>
    <line x1="800" y1="630" x2="1200" y2="230"/>
  </g>
  <!-- Circular cell rings -->
  <g opacity="0.08" stroke="#f59e0b" stroke-width="1" fill="none">
